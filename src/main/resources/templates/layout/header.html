<header th:fragment="header">
        <canvas id="sandstorm"></canvas>

        <div class="fog-container">
            <div class="fog fog1"></div>
            <div class="fog fog2"></div>
            <div class="fog fog3"></div>
        </div>
        
        <nav class="navbar" role="navigation" aria-label="Main navigation">
            <a th:href="@{/}" class="navbar-brand">MOON BLIGHT</a>

            <ul class="navbar-nav">
                <li class="nav-item "><a data-target="home" th:href="@{/}" class="nav-down" th:classappend="${activePage == 'home'} ? 'active' : ''">Trang chủ</a></li>
                <li class="nav-item "><a data-target="story" class="nav-down" th:classappend="${activePage == 'story'} ? 'active' : ''">Cốt truyện</a></li>
                <li class="nav-item "><a data-target="character" class="nav-down" th:classappend="${activePage == 'characters'} ? 'active' : ''">Nhân vật</a></li>

                <li class="nav-item "><a th:href="@{/aboutUs}" th:classappend="${activePage == 'community'} ? 'active' : ''">Về Chúng Tôi</a></li>
            </ul>

            <a th:href="@{/support}" class="navbar-cta">Support</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
            <ul class="mobile-menu-list">
                <li><a data-target="home" class="nav-down" th:classappend="${activePage == 'home'} ? 'active' : ''">Trang chủ</a></li>
                <li><a data-target="story" class="nav-down" th:classappend="${activePage == 'story'} ? 'active' : ''">Cốt truyện</a></li>

                <li><a data-target="news" class="nav-down" th:classappend="${activePage == 'news'} ? 'active' : ''">Tin tức</a></li>
                <li><a th:href="@{/aboutUs}" th:classappend="${activePage == 'community'} ? 'active' : ''">Về Chúng Tôi</a></li>
                <li><a data-target="support" class="nav-down" th:classappend="${activePage == 'support'} ? 'active' : ''">Support</a></li>
            </ul>
