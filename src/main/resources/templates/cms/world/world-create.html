<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Tạo thế giới</title>
  <link th:href="@{/css/world.css}" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>

<body>
  <div class="bg-image"></div>
  <div class="layout">
    <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"> </th:block>

    <div class="content-wrapper">
      <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

      <main class="section section-dark">
        <div class="container-sm">
          <div class="world-create-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Tạo Thế Giới Mới</h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}"></p>

            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <form class="world-form" th:action="@{/world/moonblight/create}" method="post" enctype="multipart/form-data"
              th:object="${createWorldRequest}">

              <div class="form-group">
                <label class="form-label">Tag</label>
                <input class="form-control" type="text" th:field="*{tag}">
              </div>

              <div class="form-group">
                <label class="form-label">Tiêu đề</label>
                <input class="form-control" type="text" th:field="*{title}" required>
              </div>

              <div class="form-group">
                <label class="form-label">
                  Độ ưu tiên (0 - 100)
                </label>
                <input class="form-control" type="number" th:field="*{priority}" min="0" max="100">
              </div>

              <div class="form-group">
                <label class="form-label">Ảnh đại diện</label>
                <input class="file-input" type="file" name="imageFile" accept="image/*">
              </div>

              <div class="form-group">
                <label class="form-label">
                  Nội dung thế giới
                </label>
                <textarea id="content" th:field="*{content}" style="display:none">
                    </textarea>

                <div id="quill-editor" class="world-editor">
                </div>
              </div>

              <div class="world-actions">
                <button type="submit" class="btn btn-primary">
                  Tạo Thế Giới
                </button>

                <a th:href="@{/world/moonblight/list}" class="btn btn-secondary">
                  Quay Lại
                </a>
              </div>
            </form>

          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/editor.js}"></script>
</body>

</html>
