<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Tạo câu chuyện</title>
  <!-- outer css -->
  <!-- 1. Nhúng CSS & JS của Quill -->
  <link th:href="@{/css/story.css}" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>

<body>
  <div class="bg-image"></div>
  <div class="layout">
    <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"> </th:block>

    <div class="content-wrapper">
      <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

      <main class="section section-dark">


        <div class="container-sm">
          <div class="story-create-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Tạo Câu Chuyện Mới</h1>
              <div class="section-divider"></div>
            </div>

            <!-- Success -->
            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>

            <!-- Error -->
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>


            <form class="story-form" th:action="@{/story/moonblight/create}" th:object="${createStoryRequest}"
              method="post" enctype="multipart/form-data">

              <div class="form-group">
                <label class="form-label">
                  Tiêu đề
                </label>
                <input class="form-control" type="text" th:field="*{title}" maxlength="255" required />
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">
                  Tag
                </label>
                <input class="form-control" type="text" th:field="*{tag}" />
              </div>

              <div class="form-group">

                <label class="form-label">
                  Độ ưu tiên (0 - 100)
                </label>
                <input class="form-control" type="number" th:field="*{priority}" min="0" max="100" />

              </div>

              <div class="form-group">

                <label class="form-label">
                  Ảnh đại diện
                </label>
                <input class="file-input" type="file" name="imageFile" accept="image/*" />

              </div>

              <div class="form-group">

                <label class="form-label">
                  Nội dung trích dẫn
                </label>
                <textarea class="form-control story-textarea" th:field="*{quoteContent}">
                </textarea>
                <div class="field-error" th:if="${#fields.hasErrors('quoteContent')}" th:errors="*{quoteContent}">
                </div>

              </div>

              <div class="form-group">

                <label class="form-label">
                  Tác giả trích dẫn
                </label>
                <input class="form-control" type="text" th:field="*{quoteAuthor}" />

              </div>


              <div class="form-group">

                <label class="form-label">
                  Nội dung câu chuyện
                </label>
                <!-- Hidden textarea -->
                <textarea id="content" th:field="*{content}" style="display:none">
                </textarea>
                <!-- Quill Editor -->
                <div id="quill-editor" class="story-editor">
                </div>
                <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">
                </div>

              </div>

              <div class="story-actions">

                <button type="submit" class="btn btn-primary">
                  Tạo Câu Chuyện
                </button>

                <a th:href="@{/story/moonblight/list}" class="btn btn-secondary">
                  Quay Lại
                </a>

              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/editor.js}"></script>
</body>

</html>
