<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Danh sách câu chuyện</title>
  <link rel="stylesheet" href="/css/story/story.css">
</head>

<body>
  <div class="bg-image"></div>
    <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">
    <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

      <main class="section-dark">
        <div class="container-xl">
          <div class="story-card">
            <div class="section-header">
              <span class="section-eyebrow"> Moonblight CMS </span>
              <h1 class="section-title"> Danh Sách Câu Chuyện </h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}"> </p>
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"> </p>

            <div class="top-actions">
              <a th:href="@{/story/moonblight/create}" class="btn btn-primary"> + Tạo câu chuyện
                mới </a>
            </div>

            <div class="table-wrapper">
              <table class="story-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Ưu tiên</th>
                    <th>Tiêu đề</th>
                    <th>Tag</th>
                    <th>Quote Author</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="story : ${stories.content}">
                    <td th:text="${story.id}"></td>

                    <td>
                      <img th:if="${story.image != null}" th:src="${story.image}" alt="Story Image"
                        class="table-image" />
                    </td>

                    <td th:text="${story.priority}"></td>

                    <td th:text="${story.title}"></td>

                    <td th:text="${story.tag}"></td>

                    <td th:text="${story.quoteAuthor}"></td>

                    <td>
                      <span th:if="${!story.deleted}" class="status-active"> Đang hiển thị </span>
                      <span th:if="${story.deleted}" class="status-deleted"> Đang ẩn </span>
                    </td>

                    <td>

                      <div class="action-group">
                        <form th:action="@{/story/moonblight/{id}/edit(id=${story.id})}" method="get">
                          <button type="submit" class="btn btn-primary btn-small"> Sửa </button>
                        </form>

                        <form th:if="${!story.deleted}" th:action="@{/story/moonblight/{id}/delete(id=${story.id})}"
                          method="post">
                          <button type="submit" class="btn btn-danger btn-small"> Ẩn </button>
                        </form>

                        <form th:if="${story.deleted}" th:action="@{/story/moonblight/{id}/restore(id=${story.id})}"
                          method="post">
                          <button type="submit" class="btn btn-secondary btn-small"> Khôi phục </button>
                        </form>
                      </div>

                    </td>
                  </tr>

                </tbody>
              </table>


              <div class="pagination" th:if="${stories.totalPages > 1}">
                <a class="page-btn" th:if="${!stories.first}"
                  th:href="@{/story/moonblight/list(page=${stories.number - 1})}">
                  ← Trước </a>
                <span th:each="i : ${#numbers.sequence(0, stories.totalPages - 1)}">
                  <a class="page-number" th:if="${i != stories.number}" th:href="@{/story/moonblight/list(page=${i})}"
                    th:text="${i + 1}">
                  </a>
                  <span class="page-number active" th:if="${i == stories.number}" th:text="${i + 1}"> </span>
                </span>
                <a class="page-btn" th:if="${!stories.last}"
                  th:href="@{/story/moonblight/list(page=${stories.number + 1})}">
                  Sau → </a>
              </div>
              
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>
</body>

</html>
