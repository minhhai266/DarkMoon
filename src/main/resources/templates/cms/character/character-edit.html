<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Cập nhật nhân vật</title>

  <link rel="stylesheet" th:href="@{/css/character/character.css}" />

  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>

<body>

  <div class="bg-image"></div>
        <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">
        <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

      <main class="section-dark">
        <div class="container-xl">

          <div class="character-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Cập Nhật Nhân Vật</h1>
              <div class="section-divider"></div>
            </div>

            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>

            <form class="character-form" th:action="@{/character/moonblight/{id}/edit(id=${character.id})}"
              method="post" enctype="multipart/form-data" th:object="${character}">

              <input type="hidden" th:field="*{image}" />

              <div class="form-group">
                <label class="form-label">Tên nhân vật</label>
                <input class="form-control" type="text" th:field="*{name}">
              </div>

              <div class="form-group">
                <label class="form-label">Chủng tộc</label>
                <input class="form-control" type="text" th:field="*{race}">
              </div>

              <div class="form-group">
                <label class="form-label">Quote</label>
                <input class="form-control" type="text" th:field="*{quote}">
              </div>

              <div class="form-group">
                <label class="form-label">Độ ưu tiên (0 - 100)</label>
                <input class="form-control" type="number" th:field="*{priority}" min="0" max="100">
              </div>

              <div class="form-group">
                <label class="form-label">Ảnh hiện tại</label>

                <div class="current-image-wrapper">
                  <img th:if="${character.image != null}" th:src="${character.image}" class="current-image"
                    alt="Character Image">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Ảnh mới</label>
                <input class="file-input" type="file" name="imageFile" accept="image/*">
              </div>

              <div class="form-group">
                <label class="form-label">Mô tả nhân vật</label>

                <textarea id="content" th:field="*{description}" style="display:none">
                </textarea>

                <div id="quill-editor" class="character-editor">
                </div>
              </div>

              <div class="character-actions">
                <button type="submit" class="btn btn-primary">
                  Cập nhật
                </button>

                <a th:href="@{/character/moonblight/list}" class="btn btn-secondary">
                  Quay lại
                </a>
                
              </div>

            </form>

          </div>

        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/editor.js}"></script>
</body>
</html>
