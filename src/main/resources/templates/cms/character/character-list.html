<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Danh sách nhân vật</title>

  <link rel="stylesheet" th:href="@{/css/character/character.css}" />
</head>

<body>

  <div class="bg-image"></div>
        <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">
    <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

      <main class="section-dark">
        <div class="container-xl">

          <div class="character-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Danh Sách Nhân Vật</h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>

            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>

            <div class="table-header">
              <a th:href="@{/character/moonblight/create}" class="btn btn-primary">
                + Tạo Nhân Vật
              </a>
            </div>

            <div class="table-wrapper">

              <table class="character-table">

                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Tên</th>
                    <th>Chủng tộc</th>
                    <th>Ưu tiên</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>

                <tbody>

                  <tr th:each="character : ${characters.content}">

                    <td th:text="${character.id}"></td>
                    <td>
                      <img th:if="${character.image != null}" th:src="${character.image}" class="table-image"
                        alt="Character">
                    </td>
                    <td th:text="${character.name}"></td>
                    <td th:text="${character.race}"></td>
                    <td th:text="${character.priority}"></td>

                    <td>
                      <span th:if="${!character.deleted}" class="status-active">
                        Đang hiển thị
                      </span>

                      <span th:if="${character.deleted}" class="status-deleted">
                        Đang ẩn
                      </span>
                    </td>

                    <td>
                      <div class="action-buttons">

                        <form th:action="@{/character/moonblight/{id}/edit(id=${character.id})}" method="get">
                          <button type="submit" class="btn btn-secondary btn-sm">
                            Sửa
                          </button>
                        </form>

                        <form th:if="${!character.deleted}"
                          th:action="@{/character/moonblight/{id}/delete(id=${character.id})}" method="post">

                          <button type="submit" class="btn btn-danger btn-sm">
                            Ẩn
                          </button>

                        </form>

                        <form th:if="${character.deleted}"
                          th:action="@{/character/moonblight/{id}/restore(id=${character.id})}" method="post">

                          <button type="submit" class="btn btn-success btn-sm">
                            Khôi phục
                          </button>

                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>

            </div>

            <div class="pagination" th:if="${characters.totalPages > 1}">

              <a class="page-btn" th:if="${!characters.first}"
                th:href="@{/character/moonblight/list(page=${characters.number - 1})}">
                ←
              </a>

              <span th:each="i : ${#numbers.sequence(0, characters.totalPages - 1)}">

                <a th:if="${i != characters.number}" class="page-btn" th:href="@{/character/moonblight/list(page=${i})}"
                  th:text="${i + 1}">
                </a>

                <span th:if="${i == characters.number}" class="page-current" th:text="${i + 1}">
                </span>
              </span>

              <a class="page-btn" th:if="${!characters.last}"
                th:href="@{/character/moonblight/list(page=${characters.number + 1})}">
                →
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

</body>

</html>
