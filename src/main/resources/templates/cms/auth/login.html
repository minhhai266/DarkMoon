<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Cormorant+Garamond+Decorative:wght@700&family=Crimson+Text:wght@400;600&display=swap"
    rel="stylesheet">

</head>

<body>
  <div class="bg-image"></div>
  <div class="register-card">

    <div class="register-eyebrow">
      MOONBLIGHT ACCOUNT
    </div>

    <h2 class="register-title">
      Login
    </h2>
    <div class="register-divider"></div>
    <p style="color: red" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form method="post" th:action="@{/user/moonblight/login}" th:object="${loginRequest}">
      <div class="register-group">
        <label>Username hoặc Email</label>

        <input type="text" th:field="*{login}" />

        <div style="color: red" th:if="${#fields.hasErrors('login')}" th:text="${#fields.errors('login')[0]}"></div>
      </div>



      <div class="register-group">
        <label>Password</label>

        <input type="password" th:field="*{password}" />

        <div style="color: red" th:if="${#fields.hasErrors('password')}" th:text="${#fields.errors('password')[0]}">
        </div>
      </div>

      <br />

      <button class="register-btn" type="submit">Đăng nhập</button>
    </form>

    <hr />
