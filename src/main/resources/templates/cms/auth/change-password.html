<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Đổi mật khẩu</title>
  </head>
  <body>
    <div class="layout">
      <th:block
        sec:authorize="hasRole('ADMIN')"
        th:replace="~{cms/fragments/admin-sidebar :: sidebar}"
      >
      </th:block>

      <th:block
        sec:authorize="hasRole('STAFF')"
        th:replace="~{cms/fragments/sidebar :: sidebar}"
      >
      </th:block>
      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Đổi mật khẩu</h1>

          <p
            style="color: green"
            th:if="${successMessage}"
            th:text="${successMessage}"
          ></p>

          <p
            style="color: red"
            th:if="${errorMessage}"
            th:text="${errorMessage}"
          ></p>

          <form
            th:action="@{/user/moonblight/change-password}"
            th:object="${changePasswordRequest}"
            method="post"
          >
            <div>
              <label>Mật khẩu hiện tại</label><br />
              <input type="password" th:field="*{oldPassword}" required />

              <div
                th:if="${#fields.hasErrors('oldPassword')}"
                th:errors="*{oldPassword}"
                style="color: red"
              ></div>
            </div>

            <br />

            <div>
              <label>Mật khẩu mới</label><br />
              <input type="password" th:field="*{newPassword}" required />

              <div
                th:if="${#fields.hasErrors('newPassword')}"
                th:errors="*{newPassword}"
                style="color: red"
              ></div>
            </div>

            <br />

            <div>
              <label>Xác nhận mật khẩu mới</label><br />
              <input type="password" th:field="*{confirmPassword}" required />

              <div
                th:if="${#fields.hasErrors('confirmPassword')}"
                th:errors="*{confirmPassword}"
                style="color: red"
              ></div>
            </div>

            <br />

            <button type="submit">Đổi mật khẩu</button>
          </form>
        </main>
      </div>
    </div>
  </body>
</html>
