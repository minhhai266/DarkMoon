<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Đặt lại mật khẩu</title>

  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Cormorant+Garamond+Decorative:wght@700&family=Crimson+Text:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="bg-image"></div>
  <div class="layouts">

    <div class="register-card">

      <div class="register-eyebrow">
        MOONBLIGHT ACCOUNT
      </div>

      <h2 class="register-title">
        Đặt lại mật khẩu
      </h2>

      <div class="register-divider"></div>

      <p style="color: green" th:if="${successMessage}" th:text="${successMessage}">
      </p>

      <p style="color: red" th:if="${errorMessage}" th:text="${errorMessage}">
      </p>

      <form th:action="@{/user/moonblight/reset-password}" th:object="${resetPasswordRequest}" method="post">

        <div class="register-group">
          <label>Mật khẩu mới</label>
          <input type="password" th:field="*{newPassword}" required />

          <div style="color:red" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
          </div>
        </div>

        <div class="register-group">
          <label>Xác nhận mật khẩu</label>
          <input type="password" th:field="*{confirmPassword}" required />

          <div style="color:red" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
          </div>
        </div>

        <!-- hidden fields -->
        <input type="hidden" th:field="*{email}" />
        <input type="hidden" th:field="*{otp}" />

        <button class="register-btn" type="submit">
          Đặt lại mật khẩu
        </button>

      </form>

    </div>
  </div>
</body>

</html>
