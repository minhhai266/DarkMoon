<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Đặt lại mật khẩu</title>
  </head>
  <body>
    <h1>Đặt lại mật khẩu</h1>

    <p
      style="color: green"
      th:if="${successMessage}"
      th:text="${successMessage}"
    ></p>

    <p style="color: red" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form
      th:action="@{/user/moonblight/reset-password}"
      th:object="${resetPasswordRequest}"
      method="post"
    >
      <div>
        <label>Mật khẩu mới</label>
        <br />

        <input type="password" th:field="*{newPassword}" required />

        <div
          th:if="${#fields.hasErrors('newPassword')}"
          th:errors="*{newPassword}"
          style="color: red"
        ></div>
      </div>

      <br />

      <div>
        <label>Xác nhận mật khẩu</label>
        <br />
        <input type="hidden" th:field="*{email}" />
        <input type="hidden" th:field="*{otp}" />
        <input type="password" th:field="*{confirmPassword}" required />

        <div
          th:if="${#fields.hasErrors('confirmPassword')}"
          th:errors="*{confirmPassword}"
          style="color: red"
        ></div>
      </div>

      <br />

      <button type="submit">Đặt lại mật khẩu</button>
    </form>
  </body>
</html>
