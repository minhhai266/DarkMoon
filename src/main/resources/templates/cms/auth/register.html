<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Register</title>
<link rel="stylesheet" href="/css/auth.css">  
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Cormorant+Garamond+Decorative:wght@700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>
  <div class="bg-image"></div>
  <div class="register-card">

    <div class="register-eyebrow">
      MOONBLIGHT ACCOUNT
    </div>

    <h2 class="register-title">
      Đăng ký
    </h2>
    <div class="register-divider"></div>
    <p style="color: green" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p style="color: red" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form method="post" th:action="@{/user/moonblight/register}">
      <div class="register-group">
        <label>Username</label>
        <input type="text" name="username" minlength="3" maxlength="30" required />
      </div>

      <div class="register-group">
        <label>Email</label>
        <input type="email" name="email" maxlength="255" required />
      </div>

      <div class="register-group">
        <label>Họ và tên</label>
        <input type="text" name="fullName" maxlength="255" required />
      </div>

      <div class="register-group">
        <label>Mật khẩu</label>
        <input type="password" name="password" minlength="8" required />
      </div>

      <div class="register-group">
        <label>Nhập lại mật khẩu</label>
        <input type="password" name="rePassword" required />
      </div>

      <button class="register-btn" type="submit">Đăng ký</button>
    </form>

    <hr />
