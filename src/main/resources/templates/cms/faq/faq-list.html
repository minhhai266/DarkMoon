<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Danh sách FAQ</title>
  <link rel="stylesheet" th:href="@{/css/faq/faq.css}">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
</head>

<body>
  <div class="bg-image"></div>
      <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">
    <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

      <main class="section-dark">
        <div class="container-xl">
          <div class="faq-card">

            <div class="section-header">
              <span class="section-eyebrow"> Moonblight CMS </span>
              <h1 class="section-title"> Danh sách FAQ </h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}"></p>
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <div class="table-header">
              <a th:href="@{/faq/moonblight/create}" class="btn btn-primary">
                + Tạo FAQ </a>
            </div>


            <div class="table-wrapper">
              <table class="faq-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Tiêu đề</th>
                    <th>Priority</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="faq : ${faqs.content}">
                    <td th:text="${faq.id}"></td>

                    <td th:text="${faq.title}"></td>

                    <td th:text="${faq.priority}"></td>

                    <td>
                      <span th:if="${!faq.deleted}" class="status-active">
                        Đang hiển thị </span>
                      <span th:if="${faq.deleted}" class="status-deleted">
                        Đang ẩn </span>
                    </td>
                    <td>
                      <div class="action-buttons">
                        <form th:action="@{/faq/moonblight/{id}/edit(id=${faq.id})}" method="get">
                          <button type="submit" class="btn btn-primary btn-small">
                            Sửa </button>
                        </form>
                        <form th:if="${!faq.deleted}" th:action="@{/faq/moonblight/{id}/delete(id=${faq.id})}"
                          method="post">
                          <button type="submit" class="btn btn-danger btn-small"
                            onclick="return confirm('Bạn có chắc muốn ẩn FAQ này?');">
                            Ẩn </button>
                        </form>
                        <form th:if="${faq.deleted}" th:action="@{/faq/moonblight/{id}/restore(id=${faq.id})}"
                          method="post">
                          <button type="submit" class="btn btn-secondary btn-small"
                            onclick="return confirm('Khôi phục FAQ này?');">
                            Khôi phục </button>
                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="pagination" th:if="${faqs.totalPages > 1}"> 
                <a class="page-btn" th:if="${!faqs.first}" th:href="@{/faq/moonblight/list(page=${faqs.number - 1})}">
                ← </a>
                <span th:each="i : ${#numbers.sequence(0, faqs.totalPages - 1)}"> 
                  <a th:if="${i != faqs.number}" class="page-btn" th:href="@{/faq/moonblight/list(page=${i})}" th:text="${i + 1}"> </a> 
                  <span th:if="${i == faqs.number}" class="page-current" th:text="${i + 1}"> 
                  </span> 
                </span> 
                <a class="page-btn" th:if="${!faqs.last}" th:href="@{/faq/moonblight/list(page=${faqs.number + 1})}"> →
                </a> 
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>
</body>

</html>
