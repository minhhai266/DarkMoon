<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Chỉnh sửa FAQ</title>
  <!-- outer css -->
  <!-- 1. Nhúng CSS & JS của Quill -->
  <link rel="stylesheet" th:href="@{/css/faq/faq.css}">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>

<body>
  <div class="bg-image"></div>
      <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">
    <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

      <main class="section-dark">
        <div class="container-xl">
          <div class="faq-card">
            
            <div class="section-header">
              <span class="section-eyebrow"> Moonblight CMS </span>
              <h1 class="section-title"> Chỉnh FAQ </h1>
              <div class="section-divider"></div>
            </div>
            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}"></p>

            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <form class="faq-form" th:action="@{/faq/moonblight/{id}/edit(id=${faq.id})}" th:object="${faq}"
              method="post">
              <input type="hidden" th:field="*{id}" />

              <div class="form-group">
                <label class="form-label">Tiêu đề</label>
                <input class="form-control" type="text" th:field="*{title}" maxlength="500" />
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
              </div>

              <div class="form-group">
                <label class="form-label">Độ ưu tiên (0 - 100)</label>
                <input class="form-control" type="number" th:field="*{priority}" min="0" max="100" />
                <div class="field-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
              </div>

              <div class="form-group">
                <label class="form-label">Nội dung</label>
                <textarea id="content" th:field="*{content}" style="display: none"></textarea>
                <!-- Vùng hiển thị cho người dùng gõ (Quill sẽ bám vào đây) -->
                <div id="quill-editor" class="faq-editor"></div>
                <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
              </div>

              <div class="faq-actions">
                <button type="submit" class="btn btn-primary">Cập nhật FAQ</button>
                <a th:href="@{/faq/moonblight/list}" class="btn btn-secondary"> Quay lại </a>
              </div>
            </form>
          </div>
        </div>

      </main>
    </div>
  </div>
</body>
<script th:src="@{/js/editor.js}"></script>

</html>
