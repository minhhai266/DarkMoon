<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Chi tiết tài khoản</title>

  <link rel="stylesheet" th:href="@{/css/account.css}" />
</head>

<body>
  <div class="bg-image"></div>

  <div class="layout">
    <th:block th:replace="~{cms/fragments/admin-sidebar :: sidebar}">
    </th:block>

    <div class="content-wrapper">
      <th:block th:replace="~{cms/fragments/header :: header}">
      </th:block>

      <main class="section-dark">
        <div class="container-xl">

          <div class="story-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Chi tiết tài khoản</h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>

            <div class="detail-wrapper">

              <div class="detail-row">
                <span class="detail-label">ID</span>
                <span class="detail-value" th:text="${account.id}"></span>
              </div>

              <div class="detail-row">
                <span class="detail-label">Username</span>
                <span class="detail-value" th:text="${account.username}"></span>
              </div>

              <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value" th:text="${account.email}"></span>
              </div>

              <div class="detail-row">
                <span class="detail-label">Họ tên</span>
                <span class="detail-value" th:text="${account.fullName}"></span>
              </div>

              <div class="detail-row">
                <span class="detail-label">Vai trò</span>
                <span class="detail-value" th:text="${account.role}"></span>
              </div>

              <div class="detail-row">
                <span class="detail-label">Trạng thái</span>

                <span th:if="${account.active}" class="status-active">
                  Đang hoạt động
                </span>

                <span th:if="${!account.active}" class="status-deleted">
                  Đã khóa
                </span>
              </div>

            </div>

            <div class="action-buttons">

              <form th:if="${!account.active and account.role != 'ADMIN'}"
                th:action="@{/admin/moonblight/account/{id}/approve(id=${account.id})}" method="post">

                <button type="submit" class="btn btn-success">
                  Duyệt tài khoản
                </button>

              </form>

              <form th:if="${account.active and account.role != 'ADMIN'}"
                th:action="@{/admin/moonblight/account/{id}/reject(id=${account.id})}" method="post">

                <button type="submit" class="btn btn-danger">
                  Khóa tài khoản
                </button>

              </form>

              <a th:href="@{/admin/moonblight/list}" class="btn btn-secondary">
                Quay lại danh sách
              </a>

            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
