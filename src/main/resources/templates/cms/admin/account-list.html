<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách tài khoản</title>

    <style>
      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/admin-sidebar :: sidebar}"> </th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Danh sách tài khoản</h1>

          <p
            th:if="${successMessage}"
            th:text="${successMessage}"
            style="color: green"
          ></p>

          <p
            th:if="${errorMessage}"
            th:text="${errorMessage}"
            style="color: red"
          ></p>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Họ tên</th>
                <th>Vai trò</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <!-- <th>Chi tiết</th> -->
              </tr>
            </thead>

            <tbody>
              <tr th:each="account : ${accounts.content}">
                <td th:text="${account.id}"></td>

                <td th:text="${account.username}"></td>

                <td th:text="${account.email}"></td>

                <td th:text="${account.fullName}"></td>

                <td th:text="${account.role}"></td>

                <td>

                  <span
                    th:if="${account.active}"
                    style="color: green"
                  >
                    Đang hoạt động
                  </span>

                  <span
                    th:if="${!account.active}"
                    style="color: red"
                  >
                    Đã khóa
                  </span>
                </td>

                <!-- <td th:text="${account.createdAt}"></td> -->

                <td>
                  <a
                    th:href="@{/admin/moonblight/account/{id}(id=${account.id})}"
                  >
                    Xem chi tiết
                  </a>
                </td>
              </tr>
            </tbody>
          </table>

          <br />

          <div th:if="${accounts.totalPages > 1}">
            <a
              th:if="${!accounts.first}"
              th:href="@{/admin/moonblight/list(page=${accounts.number - 1})}"
            >
              ← Trước
            </a>

            <span
              th:each="i : ${#numbers.sequence(0, accounts.totalPages - 1)}"
            >
              <a
                th:if="${i != accounts.number}"
                th:href="@{/admin/moonblight/list(page=${i})}"
                th:text="${i + 1}"
              >
              </a>

              <span
                th:if="${i == accounts.number}"
                th:text="${i + 1}"
                style="font-weight: bold"
              >
              </span>
            </span>

            <a
              th:if="${!accounts.last}"
              th:href="@{/admin/moonblight/list(page=${accounts.number + 1})}"
            >
              Sau →
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
