<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Danh sách tài khoản</title>

  <link rel="stylesheet" th:href="@{/css/account.css}" />
</head>

<body>
  <div class="bg-image"></div>

  <div class="layout">
    <th:block th:replace="~{cms/fragments/admin-sidebar :: sidebar}"></th:block>

    <div class="content-wrapper">
      <th:block th:replace="~{cms/fragments/header :: header}"></th:block>

      <main class="section-dark">
        <div class="container-xl">

          <div class="story-card">

            <div class="section-header">
              <span class="section-eyebrow">Moonblight CMS</span>
              <h1 class="section-title">Danh sách tài khoản</h1>
              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>

            <div class="table-wrapper">
              <table class="account-table">

                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Họ tên</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Chi tiết</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="account : ${accounts.content}">

                    <td th:text="${account.id}"></td>
                    <td th:text="${account.username}"></td>
                    <td th:text="${account.email}"></td>
                    <td th:text="${account.fullName}"></td>
                    <td th:text="${account.role}"></td>

                    <td>
                      <span th:if="${account.active}" class="status-active">
                        Đang hoạt động
                      </span>

                      <span th:if="${!account.active}" class="status-deleted">
                        Đã khóa
                      </span>
                    </td>

                    <td>
                      <a class="btn btn-secondary btn-sm" th:href="@{/admin/moonblight/account/{id}(id=${account.id})}">
                        Xem chi tiết
                      </a>
                    </td>

                  </tr>
                </tbody>
              </table>
            </div>

            <div class="pagination" th:if="${accounts.totalPages > 1}">

              <a class="page-btn" th:if="${!accounts.first}"
                th:href="@{/admin/moonblight/list(page=${accounts.number - 1})}">
                ←
              </a>

              <span th:each="i : ${#numbers.sequence(0, accounts.totalPages - 1)}">

                <a th:if="${i != accounts.number}" class="page-btn" th:href="@{/admin/moonblight/list(page=${i})}"
                  th:text="${i + 1}">
                </a>

                <span th:if="${i == accounts.number}" class="page-current" th:text="${i + 1}">
                </span>

              </span>

              <a class="page-btn" th:if="${!accounts.last}"
                th:href="@{/admin/moonblight/list(page=${accounts.number + 1})}">
                →
              </a>

            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
