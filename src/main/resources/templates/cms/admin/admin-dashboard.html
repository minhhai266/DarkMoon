<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Quản trị</title>
  </head>
  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/admin-sidebar :: sidebar}"> </th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Dashboard Quản trị</h1>

          <br />

          <!-- THỐNG KÊ -->

          <section>
            <h2>Tổng quan hệ thống</h2>

            <table border="1">
              <tr>
                <th>Tổng tài khoản</th>
                <th>Đang hoạt động</th>
                <th>Chờ duyệt</th>
                <th>Bị khóa</th>
              </tr>

              <tr>
                <td th:text="${totalUsers}">0</td>
                <td th:text="${activeUsers}">0</td>
                <td th:text="${inActiveUsers}">0</td>
              </tr>
            </table>
          </section>

          <br />
          <hr />
          <br />

          <!-- STAFF CHỜ DUYỆT -->

          <section>
            <h2>Tài khoản chờ duyệt</h2>

            <table border="1">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Họ tên</th>
                  <th>Chi tiết</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="account : ${pendingAccounts}">
                  <td th:text="${account.id}"></td>

                  <td th:text="${account.username}"></td>

                  <td th:text="${account.email}"></td>

                  <td th:text="${account.fullName}"></td>

                  <td>
                    <a
                      th:href="@{/admin/moonblight/account/{id}(id=${account.id})}"
                    >
                      Xem
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </section>

          <br />
          <hr />
          <br />

          <!-- AUDIT LOG -->

          <!-- <section>
            <h2>10 hoạt động gần nhất</h2>

            <table border="1">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Người dùng</th>
                  <th>Hành động</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="log : ${latestLogs}">
                  <td th:text="${log.createdAt}"></td>

                  <td th:text="${log.username}"></td>

                  <td th:text="${log.action}"></td>
                </tr>
              </tbody>
            </table>
          </section> -->
        </main>
      </div>
    </div>
  </body>
</html>
