<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Quản trị</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  </head>

  <body>
    <div class="bg-image"></div>
    <div th:replace="~{cms/fragments/header :: header}"></div>
    <div class="layout">
      <div th:replace="~{cms/fragments/admin-sidebar :: sidebar}"></div>

      <div class="content-wrapper">
        <main class="section-dark">
          <div class="container-xl">
            <div class="story-card">
              <div class="section-header">
                <span class="section-eyebrow"> Moonblight CMS </span>

                <h1 class="section-title">Dashboard Quản Trị</h1>

                <div class="section-divider"></div>
              </div>

              <!-- STATS -->

              <div class="stats-grid">
                <div class="stat-card">
                  <span class="stat-label">Tổng tài khoản</span>
                  <h2 th:text="${totalUsers}">0</h2>
                </div>

                <div class="stat-card active">
                  <span class="stat-label">Đang hoạt động</span>
                  <h2 th:text="${activeUsers}">0</h2>
                </div>

                <div class="stat-card pending">
                  <span class="stat-label">Chờ duyệt</span>
                  <h2 th:text="${inActiveUsers}">0</h2>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
