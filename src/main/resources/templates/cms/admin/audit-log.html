<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Audit Logs</title>
  </head>

  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/admin-sidebar :: sidebar}">
      </th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Audit Logs</h1>

          <table border="1">
            <thead>
              <tr>
                <th>ID</th>
                <th>Người thực hiện</th>
                <th>Loại đối tượng</th>
                <th>ID đối tượng</th>
                <th>Hành động</th>
                <th>Mô tả</th>
                <th>Thời gian</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="log : ${logs.content}">
                <td th:text="${log.id}"></td>

                <td th:text="${log.username}"></td>

                <td th:text="${log.entityType}"></td>

                <td th:text="${log.entityId}"></td>

                <td th:text="${log.action}"></td>

                <td th:text="${log.description}"></td>

                <td th:text="${log.createdAt}"></td>
              </tr>
            </tbody>
          </table>

          <br />

          <div th:if="${logs.totalPages > 1}">
            <a
              th:if="${!logs.first}"
              th:href="@{/admin/moonblight/log(page=${logs.number - 1})}"
            >
              ← Trước
            </a>

            <span th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}">
              <a
                th:if="${i != logs.number}"
                th:href="@{/admin/moonblight/log(page=${i})}"
                th:text="${i + 1}"
              >
              </a>

              <span
                th:if="${i == logs.number}"
                th:text="${i + 1}"
                style="font-weight: bold"
              >
              </span>
            </span>

            <a
              th:if="${!logs.last}"
              th:href="@{/admin/moonblight/log(page=${logs.number + 1})}"
            >
              Sau →
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
