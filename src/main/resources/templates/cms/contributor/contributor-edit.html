<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Cập nhật người đóng góp</title>

    <link rel="stylesheet" th:href="@{/css/contributor/contributor.css}" />
  </head>

  <body>
    <div class="bg-image"></div>

    <div th:replace="~{cms/fragments/header :: header}"></div>

    <div class="layout">
      ```
      <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

      <div class="content-wrapper">
        <main class="section-dark">
          <div class="container-xl">
            <div class="contributor-card">
              <div class="section-header">
                <span class="section-eyebrow"> Moonblight CMS </span>

                <h1 class="section-title">Cập Nhật Người Đóng Góp</h1>

                <div class="section-divider"></div>
              </div>

              <p
                class="error-message"
                th:if="${errorMessage}"
                th:text="${errorMessage}"
              ></p>

              <form
                class="contributor-form"
                th:action="@{/contributor/moonblight/{id}/edit(id=${contributor.id})}"
                method="post"
                enctype="multipart/form-data"
                th:object="${contributor}"
              >
                <input type="hidden" th:field="*{avatar}" />

                <div class="form-group">
                  <label class="form-label"> Tên người đóng góp </label>

                  <input class="form-control" type="text" th:field="*{name}" />
                </div>

                <div class="form-group">
                  <label class="form-label"> Chức danh </label>

                  <input
                    class="form-control"
                    type="text"
                    th:field="*{position}"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label"> Độ ưu tiên </label>

                  <input
                    class="form-control"
                    type="number"
                    th:field="*{priority}"
                    min="0"
                    max="100"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label"> Ảnh hiện tại </label>

                  <div class="current-image-wrapper">
                    <img
                      th:if="${contributor.avatar != null}"
                      th:src="${contributor.avatar}"
                      class="current-image"
                      alt="Contributor Avatar"
                    />

                    <div th:if="${contributor.avatar == null}">Chưa có ảnh</div>
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label"> Ảnh mới </label>

                  <input
                    class="file-input"
                    type="file"
                    name="thumbnail"
                    accept="image/*"
                  />
                </div>

                <div class="contributor-actions">
                  <button type="submit" class="btn btn-primary">
                    Cập nhật
                  </button>

                  <a
                    th:href="@{/contributor/moonblight/list}"
                    class="btn btn-secondary"
                  >
                    Quay lại
                  </a>
                </div>
              </form>
            </div>
          </div>
        </main>
      </div>
      ```
    </div>
  </body>
</html>
