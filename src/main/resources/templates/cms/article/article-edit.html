<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Cập nhật bài viết</title>

  <!-- Quill -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <!-- Article CSS -->
  <link rel="stylesheet" th:href="@{/css/article.css}">
</head>

<body>

  <div class="bg-image"></div>

  <div class="layout">

    <th:block th:replace="~{cms/fragments/sidebar :: sidebar}">
    </th:block>

    <div class="content-wrapper">

      <th:block th:replace="~{cms/fragments/header :: header}">
      </th:block>

      <main class="section-dark">

        <div class="container-xl">

          <div class="article-card">

            <div class="section-header">
              <span class="section-eyebrow">
                Moonblight CMS
              </span>

              <h1 class="section-title">
                Cập nhật bài viết
              </h1>

              <div class="section-divider"></div>
            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>
            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>

            <form class="article-form" th:action="@{/article/moonblight/{id}/edit(id=${article.id})}"
              th:object="${article}" method="post" enctype="multipart/form-data">

              <!-- Tiêu đề -->
              <div class="form-group">

                <label class="form-label">
                  Tiêu đề
                </label>
                <input class="form-control" type="text" th:field="*{title}" maxlength="255" required />
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                </div>

              </div>

              <!-- Loại bài viết -->
              <div class="form-group">

                <label class="form-label">
                  Loại bài viết
                </label>

                <select class="form-control" th:field="*{type}" required>

                  <option value="">
                    -- Chọn loại bài viết --
                  </option>
                  <option th:each="type : ${articleTypes}" th:value="${type}" th:text="${type.displayName}">
                  </option>

                </select>
                <div class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">
                </div>

              </div>

              <!-- Thumbnail hiện tại -->
              <div class="form-group">
                <label class="form-label">
                  Thumbnail hiện tại
                </label>
                <img th:if="${article.thumbnailUrl != null}" th:src="${article.thumbnailUrl}" alt="Thumbnail"
                  class="article-image" />
              </div>

              <!-- Thumbnail mới -->
              <div class="form-group">
                <label class="form-label">
                  Thumbnail mới (không bắt buộc)
                </label>
                <input class="file-input" type="file" name="thumbnail" accept="image/*" />
              </div>

              <!-- Nội dung -->
              <div class="form-group">

                <label class="form-label">
                  Nội dung bài viết
                </label>
                <textarea id="content" th:field="*{content}" style="display:none">
                                </textarea>
                <div id="quill-editor" class="article-editor">
                </div>
                <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">
                </div>

              </div>

              <!-- Actions -->
              <div class="article-actions">

                <button type="submit" class="btn btn-primary">
                  Cập nhật bài viết
                </button>

                <a th:href="@{/article/moonblight/list}" class="btn btn-secondary">
                  Quay lại
                </a>

              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script th:src="@{/js/editor.js}"></script>

</body>

</html>
