<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Danh sách bài viết</title>
  <link rel="stylesheet" th:href="@{/css/article/article.css}">


</head>

<body>

  <div class="bg-image"></div>
  <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layout">

      <div th:replace="~{cms/fragments/sidebar :: sidebar}"></div>


    <div class="content-wrapper">

      <main class="section-dark">

        <div class="container-xl">

          <div class="article-card">

            <div class="section-header">

              <span class="section-eyebrow">
                Moonblight CMS
              </span>

              <h1 class="section-title">
                Danh sách bài viết
              </h1>

              <div class="section-divider"></div>

            </div>

            <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
            </p>

            <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            </p>
            <div class="table-header">
              <a th:href="@{/article/moonblight/create}" class="btn btn-primary">
                + Tạo bài viết
              </a>
            </div>

            <div class="table-wrapper">

              <table class="article-table">

                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Thumbnail</th>
                    <th>Tiêu đề</th>
                    <th>Tác giả</th>
                    <th>Loại</th>
                    <th>Ngày tạo</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>

                <tbody>

                  <tr th:each="article : ${articles.content}">

                    <td th:text="${article.id}"></td>

                    <td>

                      <img class="table-image" th:if="${not #strings.isEmpty(article.thumbnailUrl)}"
                        th:src="${article.thumbnailUrl}" th:alt="${article.title}" />

                    </td>
                    <td th:text="${article.title}"></td>
                    <td th:text="${article.authorUsername}"></td>
                    <td th:text="${article.type}"></td>
                    <td th:text="${article.createdAt}"></td>

                    <td>

                      <span th:if="${!article.deleted}" class="status-active">
                        Đang hiển thị
                      </span>

                      <span th:if="${article.deleted}" class="status-deleted">
                        Đang ẩn
                      </span>

                    </td>

                    <td>

                      <div class="action-buttons">

                        <form th:action="@{/article/moonblight/{id}/edit(id=${article.id})}" method="get">

                          <button type="submit" class="btn btn-secondary btn-sm">
                            Sửa
                          </button>

                        </form>

                        <form th:if="${!article.deleted}"
                          th:action="@{/article/moonblight/{id}/delete(id=${article.id})}" method="post">

                          <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Bạn có chắc chắn muốn ẩn bài viết này không?');">
                            Ẩ<nav></nav>
                          </button>

                        </form>

                        <form th:if="${article.deleted}"
                          th:action="@{/article/moonblight/{id}/restore(id=${article.id})}" method="post">

                          <button type="submit" class="btn btn-success btn-sm"
                            onclick="return confirm('Khôi phục bài viết này?');">
                            Khôi phục
                          </button>

                        </form>

                      </div>

                    </td>

                  </tr>

                </tbody>

              </table>

            </div>

            <div class="pagination" th:if="${articles.totalPages > 1}">

              <a class="page-btn" th:if="${!articles.first}"
                th:href="@{/article/moonblight/list(page=${articles.number - 1})}">
                ←
              </a>

              <span th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}">

                <a th:if="${i != articles.number}" class="page-btn" th:href="@{/article/moonblight/list(page=${i})}"
                  th:text="${i + 1}">
                </a>

                <span th:if="${i == articles.number}" class="page-current" th:text="${i + 1}">
                </span>

              </span>

              <a class="page-btn" th:if="${!articles.last}"
                th:href="@{/article/moonblight/list(page=${articles.number + 1})}">
                →
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
